<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Successful - The SG Travel Buddy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-red: #EE2C3C; /* Classic Singapore Red */
            --text-dark: #1A1A1A;
            --bg-light: #F9FAFB;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-light);
            color: var(--text-dark);
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            background: white;
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 400px;
            width: 90%;
        }

        .icon {
            font-size: 3.5rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            color: var(--text-dark);
        }

        p {
            line-height: 1.6;
            color: #4B5563;
            margin-bottom: 1.5rem;
        }

        .highlight {
            font-weight: 600;
            color: var(--primary-red);
        }

        .footer-note {
            font-size: 0.85rem;
            color: #9CA3AF;
            border-top: 1px solid #E5E7EB;
            padding-top: 1.5rem;
        }

        @media (max-width: 480px) {
            .container {
                padding: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">✅</div>
        <h1>Payment received!</h1>
        <p>Check your email for your <span class="highlight">private access link</span>. You can use it to access the guide for the next 21 days.</p>
        <div class="footer-note">
            (If you don't see it in a few minutes, please check your <strong>spam/junk folder</strong>)
        </div>
    </div>
</body>
</html>
